name: CI — Lint, Test, Build and Push

on:
  push:
    branches: [ dev, staging, main ]
  workflow_dispatch:

jobs:
  # ─────────────────────────────
  # JOB 1 — Lint
  # ─────────────────────────────
  lint:
    name: Lint Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: Backend/package-lock.json

      - name: Install dependencies
        run: cd Backend && npm install

      - name: Run ESLint
        run: cd Backend && npm run lint

  # ─────────────────────────────
  # JOB 2 — Test
  # ─────────────────────────────
  test:
    name: Test Backend API
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: Backend/package-lock.json

      - name: Install dependencies
        run: cd Backend && npm install

      - name: Run API Tests
        run: cd Backend && npm test

  # ─────────────────────────────
  # JOB 3 — Build + Push
  # ─────────────────────────────
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "backend_host=backend" >> $GITHUB_OUTPUT
            echo "env_tag=prod" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" = "staging" ]; then
            echo "backend_host=backend-staging" >> $GITHUB_OUTPUT
            echo "env_tag=staging" >> $GITHUB_OUTPUT
          else
            echo "backend_host=backend-dev" >> $GITHUB_OUTPUT
            echo "env_tag=dev" >> $GITHUB_OUTPUT
          fi

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./Backend
          dockerfile: ./Backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ims-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/ims-backend:${{ steps.env.outputs.env_tag }}
            ${{ secrets.DOCKER_USERNAME }}/ims-backend:${{ github.sha }}

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./Frontend/inventory_management_system
          dockerfile: ./Frontend/inventory_management_system/Dockerfile
          push: true
          build-args: |
            BACKEND_HOST=${{ steps.env.outputs.backend_host }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ims-frontend:${{ steps.env.outputs.env_tag }}
            ${{ secrets.DOCKER_USERNAME }}/ims-frontend:${{ github.sha }}
