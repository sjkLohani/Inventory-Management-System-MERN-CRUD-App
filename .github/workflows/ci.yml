name: CI — Build and Push Images

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./Backend
          dockerfile: ./Backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ims-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/ims-backend:${{ github.sha }}

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./Frontend/inventory_management_system
          dockerfile: ./Frontend/inventory_management_system/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ims-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/ims-frontend:${{ github.sha }}
