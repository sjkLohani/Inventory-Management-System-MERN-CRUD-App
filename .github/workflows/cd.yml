name: CD — Deploy on Self-Hosted Runner

on:
  workflow_run:
    workflows: ["CI — Build and Push Images"]
    types:
      - completed
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted

    # Sirf tab deploy karo jab CI successful ho
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Pull Latest Images
        run: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/ims-backend:latest
          docker pull ${{ secrets.DOCKER_USERNAME }}/ims-frontend:latest
          docker pull mongo:latest

      - name: Stop Old Containers
        run: |
          docker compose down
        continue-on-error: true

      - name: Update docker-compose to use Hub images
        run: |
          docker compose -f docker-compose.prod.yml up -d

      - name: Verify Containers Running
        run: |
          docker ps
          echo "Deployment complete!"
