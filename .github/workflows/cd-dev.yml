name: CD — Deploy Dev (port 3002)

on:
  workflow_run:
    workflows: ["CI — Lint, Test, Build and Push"]
    types:
      - completed
    branches: [ dev ]
  workflow_dispatch:

jobs:
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/Inventory-Management-System-MERN-CRUD-App

            # Pull latest code
            git pull origin dev

            # Log in to Docker Hub
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            # Pull latest dev images
            docker pull ${{ secrets.DOCKER_USERNAME }}/ims-backend:dev
            docker pull ${{ secrets.DOCKER_USERNAME }}/ims-frontend:dev
            docker pull mongo:latest

            # Redeploy
            docker compose -f docker-compose.dev.yml down
            DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }} docker compose -f docker-compose.dev.yml up -d

            # Verify running containers
            docker ps
