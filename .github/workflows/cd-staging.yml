name: CD — Deploy Staging (port 3001)

on:
  workflow_run:
    workflows: ["CI — Lint, Test, Build and Push"]
    types:
      - completed
    branches: [ staging ]
  workflow_dispatch:

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: self-hosted
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Pull Latest Images
        run: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/ims-backend:staging
          docker pull ${{ secrets.DOCKER_USERNAME }}/ims-frontend:staging
          docker pull mongo:latest

      - name: Stop Old Staging Containers
        run: docker compose -f docker-compose.staging.yml down
        continue-on-error: true

      - name: Deploy Staging Containers
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        run: docker compose -f docker-compose.staging.yml up -d

      - name: Verify
        run: docker ps
