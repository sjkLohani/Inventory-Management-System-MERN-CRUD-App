name: CI-CD — Build, Push and Deploy (Single File)

on:
  push:
    branches: [ main ]

jobs:
  # ─────────────────────────────────────────
  # JOB 1 — CI: Build and Push to Docker Hub
  # ─────────────────────────────────────────
  build-and-push:
    name: CI — Build and Push Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./Backend
          dockerfile: ./Backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ims-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/ims-backend:${{ github.sha }}

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./Frontend/inventory_management_system
          dockerfile: ./Frontend/inventory_management_system/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ims-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/ims-frontend:${{ github.sha }}

  # ─────────────────────────────────────────
  # JOB 2 — CD: Deploy on Self-Hosted Runner
  # Sirf tab chale jab Job 1 successful ho
  # ─────────────────────────────────────────
  deploy:
    name: CD — Deploy to Staging (port 3001)
    runs-on: self-hosted
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Pull Latest Images
        run: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/ims-backend:latest
          docker pull ${{ secrets.DOCKER_USERNAME }}/ims-frontend:latest
          docker pull mongo:latest

      - name: Stop Old Staging Containers
        run: docker compose -f docker-compose.staging.yml down
        continue-on-error: true

      - name: Deploy Staging Containers
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        run: docker compose -f docker-compose.staging.yml up -d

      - name: Verify Containers Running
        run: docker ps
